<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تشکر — ثبت‌نام دریافت شد</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body{font-family:'Vazirmatn',sans-serif;background:#060d1c;color:#eaf1fb;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
  .card{max-width:720px;background:#0f1f3d;border:1px solid #1c2e52;padding:28px;border-radius:16px;text-align:center}
  h1{margin-bottom:8px;color:#7be0a0}
  p{color:#cfe6ff;margin-bottom:18px}
  a{display:inline-block;padding:12px 18px;border-radius:10px;background:linear-gradient(90deg,#6ee7f9,#2f7fe8);color:#04101f;text-decoration:none;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <h1>ممنون از ثبت‌نام شما</h1>
    <p>ثبت‌نام شما با موفقیت دریافت شد. لینک ورود به کلاس به شماره‌ای که وارد کردید از طریق پیامک ارسال خواهد شد.</p>
    <p>در صورت نیاز می‌توانید از طریق لینک زیر به صفحهٔ ثبت‌نام بازگردید.</p>
  </div>
</body>
</html>
